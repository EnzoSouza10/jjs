name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build debug APK
        run: |
          set -o pipefail
          docker pull ghcr.io/kivy/buildozer:latest
          docker run --rm \
            --volume "$PWD":/home/user/hostcwd \
            --workdir /home/user/hostcwd \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -lc "yes | buildozer --verbose android debug" 2>&1 | tee buildozer-build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: auto-jjs-debug-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-build-log
          path: buildozer-build.log
          if-no-files-found: ignore
