name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build debug APK
        run: |
          set -o pipefail
          docker pull ghcr.io/kivy/buildozer:latest
          docker run --rm \
            --volume "$PWD":/home/user/hostcwd \
            --workdir /home/user/hostcwd \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -lc "if command -v apt-get >/dev/null; then apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential g++ pkg-config; fi; yes | buildozer android debug" 2>&1 | tee buildozer-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "Buildozer failed. Error context:"
            grep -i -C 8 -E "error:|exception|traceback|failed|what went wrong|execution failed|compile.*failed|manifest|java.lang|cannot find symbol" buildozer-build.log || true
            echo "Buildozer failed. Last 120 log lines:"
            tail -n 120 buildozer-build.log
            exit "$status"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: auto-jjs-debug-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-build-log
          path: buildozer-build.log
          if-no-files-found: ignore
